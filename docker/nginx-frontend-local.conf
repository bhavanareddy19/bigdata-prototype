server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /chat               { proxy_pass http://backend:8000; }
    location /analyze-log        { proxy_pass http://backend:8000; }
    location /analyze-airflow-task { proxy_pass http://backend:8000; }
    location /analyze-k8s-pod    { proxy_pass http://backend:8000; }
    location /k8s/               { proxy_pass http://backend:8000; }
    location /index/             { proxy_pass http://backend:8000; }
    location /lineage/           { proxy_pass http://backend:8000; }
    location /ops/               { proxy_pass http://backend:8000; }
    location /health             { proxy_pass http://backend:8000; }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
