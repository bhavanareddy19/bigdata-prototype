steps:
  # Step 1: Build the backend image
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "docker/Dockerfile.backend",
        "-t",
        "us-central1-docker.pkg.dev/bda-project-gcp/bigdata-repo/backend:latest",
        "."
      ]

  # Step 2: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bigdata-backend
      - --image=us-central1-docker.pkg.dev/bda-project-gcp/bigdata-repo/backend:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=1
      - --timeout=300
      - --set-env-vars=APP_ENV=prod,LLM_PROVIDER=vertex,VERTEX_PROJECT_ID=bda-project-gcp,VERTEX_LOCATION=us-central1,VERTEX_MODEL=gemini-2.5-flash,GOOGLE_CLOUD_PROJECT=bda-project-gcp,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=True,GCS_DATA_BUCKET=bda-project-gcp-data,VECTOR_STORE_PROVIDER=chroma_local,CHROMADB_MODE=local,CHROMADB_PERSIST_DIR=/tmp/chromadb,STORAGE_MODE=gcs,PIPELINE_NAMESPACE=bigdata-platform

images:
  - us-central1-docker.pkg.dev/bda-project-gcp/bigdata-repo/backend:latest