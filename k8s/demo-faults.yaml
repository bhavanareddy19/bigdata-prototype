## Demo namespace with intentionally broken pods for observability demo
## Apply with: kubectl apply -f k8s/demo-faults.yaml
## Remove with: kubectl delete -f k8s/demo-faults.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-faults
  labels:
    purpose: observability-demo
---
# ── Pod 1: CrashLoopBackOff ───────────────────────────────────
# Simulates a service that starts and immediately exits with error code 1.
# kubectl get pods -n demo-faults → STATUS: CrashLoopBackOff
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-loop-app
  namespace: demo-faults
  labels:
    app: crash-loop-app
    scenario: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-loop-app
  template:
    metadata:
      labels:
        app: crash-loop-app
        scenario: crashloop
    spec:
      containers:
        - name: crash-loop-app
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting data pipeline worker..."
              echo "Connecting to database at postgres:5432..."
              sleep 2
              echo "ERROR: Connection refused: postgres:5432"
              echo "FATAL: Could not connect to database after 3 retries."
              echo "Stack trace:"
              echo "  at DatabasePool.connect (pool.js:142)"
              echo "  at PipelineWorker.init (worker.js:67)"
              echo "  at main (index.js:12)"
              exit 1
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
---
# ── Pod 2: ImagePullBackOff ───────────────────────────────────
# Simulates a deployment that references a non-existent container image.
# kubectl get pods -n demo-faults → STATUS: ImagePullBackOff / ErrImagePull
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-pull-error
  namespace: demo-faults
  labels:
    app: image-pull-error
    scenario: imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-pull-error
  template:
    metadata:
      labels:
        app: image-pull-error
        scenario: imagepull
    spec:
      containers:
        - name: image-pull-error
          image: gcr.io/bigdata-demo/ml-model-server:v9.9.9-does-not-exist
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
---
# ── Pod 3: OOMKilled ─────────────────────────────────────────
# Simulates an out-of-memory scenario by setting an extremely low memory limit.
# The process will be killed with exit code 137 (OOMKilled).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-killed-app
  namespace: demo-faults
  labels:
    app: oom-killed-app
    scenario: oomkilled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-killed-app
  template:
    metadata:
      labels:
        app: oom-killed-app
        scenario: oomkilled
    spec:
      containers:
        - name: oom-killed-app
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting ML feature extraction job..."
              echo "Loading dataset into memory..."
              python3 -c "
              import sys
              print('Allocating large array to simulate OOM...')
              # Allocate memory until killed
              data = []
              for i in range(100000):
                  data.append(bytearray(1024))
              print('Done — this line will never print')
              "
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "48Mi"   # Very low limit → will OOMKill quickly
---
# ── Pod 4: Pending (insufficient resources) ───────────────────
# Simulates a pod stuck in Pending due to impossible resource requests.
# kubectl get pods -n demo-faults → STATUS: Pending
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-starved
  namespace: demo-faults
  labels:
    app: resource-starved
    scenario: pending
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-starved
  template:
    metadata:
      labels:
        app: resource-starved
        scenario: pending
    spec:
      containers:
        - name: resource-starved
          image: nginx:1.25
          resources:
            requests:
              cpu: "999"       # 999 CPUs — impossible to schedule
              memory: "999Gi"  # 999 GiB — impossible to schedule
            limits:
              cpu: "999"
              memory: "999Gi"
