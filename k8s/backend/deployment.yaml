apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: backend
type: Opaque
stringData:
  # Populated at deploy time from local .env via the deploy script.
  GOOGLE_API_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: backend
data:
  LLM_PROVIDER: "vertex"
  VERTEX_MODEL: "gemini-2.5-flash"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  CHROMADB_MODE: "local"
  CHROMADB_PERSIST_DIR: "/data/chromadb"
  AIRFLOW_BASE_URL: "http://airflow-webserver.airflow.svc.cluster.local:8080"
  AIRFLOW_USERNAME: "admin"
  AIRFLOW_PASSWORD: "admin"
  PORT: "8080"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-pvc
  namespace: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: IMAGE_BACKEND
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef:    { name: backend-secrets }
          volumeMounts:
            - name: chromadb-storage
              mountPath: /data/chromadb
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1.5Gi"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: chromadb-storage
          persistentVolumeClaim:
            claimName: chromadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
