apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: backend
type: Opaque
stringData:
  # Populated at deploy time from local .env via the deploy script.
  GOOGLE_API_KEY: "REPLACE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: backend
data:
  LLM_PROVIDER: "vertex"
  VERTEX_MODEL: "gemini-2.5-flash"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  CHROMADB_MODE: "local"
  CHROMADB_PERSIST_DIR: "/chromadb"
  MARQUEZ_URL: "http://marquez-api.data.svc.cluster.local:5000"
  PIPELINE_NAMESPACE: "bigdata-platform"
  AIRFLOW_BASE_URL: "http://airflow-webserver.airflow.svc.cluster.local:80"
  AIRFLOW_USERNAME: "admin"
  AIRFLOW_PASSWORD: "admin"
  PORT: "8080"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-pvc
  namespace: backend
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: IMAGE_BACKEND
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef:    { name: backend-secrets }
          volumeMounts:
            - name: chromadb-storage
              mountPath: /chromadb
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 90
            periodSeconds: 30
      volumes:
        - name: chromadb-storage
          persistentVolumeClaim:
            claimName: chromadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
