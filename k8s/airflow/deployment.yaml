apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: airflow
type: Opaque
stringData:
  AIRFLOW__CORE__FERNET_KEY: "qzSQcblwwHm_msLLg5iEf8Tth45rbXyjN4K9EKnWLwI="
  AIRFLOW__WEBSERVER__SECRET_KEY: "change-me-in-prod-bigdata-platform"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres.data.svc.cluster.local:5432/airflow"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow
data:
  AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
  # OpenLineage → Marquez
  OPENLINEAGE_URL: "http://marquez-api.data.svc.cluster.local:5000"
  OPENLINEAGE_NAMESPACE: "bigdata-platform"
  MARQUEZ_URL: "http://marquez-api.data.svc.cluster.local:5000"
  # Data zone paths (on the shared PVC)
  LANDING_ZONE: "/data/landing"
  RAW_ZONE: "/data/raw"
  STAGING_ZONE: "/data/staging"
  PROCESSED_ZONE: "/data/processed"
  CURATED_ZONE: "/data/curated"
  FEATURES_DIR: "/data/features"
  MODELS_DIR: "/data/models"
  DEMO_DIR: "/data/demo"
  BACKEND_URL: "http://backend.backend.svc.cluster.local:8080"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-data-pvc
  namespace: airflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ── Airflow Webserver ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
        - name: db-init
          image: IMAGE_AIRFLOW
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              airflow db migrate
              airflow users create \
                --username admin --password admin \
                --firstname Admin --lastname User \
                --role Admin --email admin@example.com || true
              echo "Airflow DB init complete."
          envFrom:
            - configMapRef: { name: airflow-config }
            - secretRef:    { name: airflow-secrets }
          volumeMounts:
            - name: data-lake
              mountPath: /data
      containers:
        - name: webserver
          image: IMAGE_AIRFLOW
          imagePullPolicy: Always
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: airflow-config }
            - secretRef:    { name: airflow-secrets }
          volumeMounts:
            - name: data-lake
              mountPath: /data
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 180
            periodSeconds: 30
      volumes:
        - name: data-lake
          persistentVolumeClaim:
            claimName: airflow-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
# ── Airflow Scheduler ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      initContainers:
        # Wait for webserver init to finish DB migration before scheduler starts
        - name: wait-for-db
          image: IMAGE_AIRFLOW
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Waiting for Airflow DB to be ready..."
              until airflow db check; do
                echo "DB not ready, sleeping 5s..."
                sleep 5
              done
              echo "DB ready."
          envFrom:
            - configMapRef: { name: airflow-config }
            - secretRef:    { name: airflow-secrets }
      containers:
        - name: scheduler
          image: IMAGE_AIRFLOW
          imagePullPolicy: Always
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef: { name: airflow-config }
            - secretRef:    { name: airflow-secrets }
          volumeMounts:
            - name: data-lake
              mountPath: /data
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: data-lake
          persistentVolumeClaim:
            claimName: airflow-data-pvc
