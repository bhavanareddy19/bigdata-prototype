# ── Marquez API (OpenLineage backend) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-api
  namespace: data
  labels:
    app: marquez-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: marquez-api
  template:
    metadata:
      labels:
        app: marquez-api
    spec:
      initContainers:
        # Wait for Postgres to be accepting connections before starting Marquez
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres.data.svc.cluster.local -U airflow; do echo waiting for postgres; sleep 3; done"]
      containers:
        - name: marquez-api
          image: marquezproject/marquez:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
            - name: admin
              containerPort: 5001
          env:
            - name: MARQUEZ_PORT
              value: "5000"
            - name: MARQUEZ_ADMIN_PORT
              value: "5001"
            - name: POSTGRES_HOST
              value: postgres.data.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: marquez
            - name: POSTGRES_USER
              value: marquez
            - name: POSTGRES_PASSWORD
              value: marquez
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 5001
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 5001
            initialDelaySeconds: 90
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: marquez-api
  namespace: data
spec:
  selector:
    app: marquez-api
  ports:
    - name: http
      port: 5000
      targetPort: 5000
    - name: admin
      port: 5001
      targetPort: 5001
  type: ClusterIP
---
# ── Marquez Web UI ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-web
  namespace: data
  labels:
    app: marquez-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marquez-web
  template:
    metadata:
      labels:
        app: marquez-web
    spec:
      containers:
        - name: marquez-web
          image: marquezproject/marquez-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: MARQUEZ_HOST
              value: marquez-api.data.svc.cluster.local
            - name: MARQUEZ_PORT
              value: "5000"
            - name: WEB_PORT
              value: "3000"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: marquez-web
  namespace: data
spec:
  selector:
    app: marquez-web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
